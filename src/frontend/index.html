<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILVER - Frontend</title>
    <style type="text/tailwindcss">
        @tailwind base;
        @tailwind components;
        @tailwind utilities;
    </style>
    <script type="module" src="/resources/js/app.js" defer></script>
</head>
<body class="bg-gray-100" x-data="{ greeting: 'Silver Frontend' }">
    <div id="app" class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-900 text-center mb-2" x-text="greeting"></h1>
        <p class="text-center text-gray-500 mb-8">Gestão Financeira Pessoal</p>

        <!-- Placeholder para conteúdo dinâmico -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-green-50 rounded p-4 border border-green-200">
                    <p class="text-sm text-green-600">Receitas</p>
                    <p class="text-xl font-bold text-green-700">R$ 0,00</p>
                </div>
                <div class="bg-red-50 rounded p-4 border border-red-200">
                    <p class="text-sm text-red-600">Despesas</p>
                    <p class="text-xl font-bold text-red-700">R$ 0,00</p>
                </div>
                <div class="bg-blue-50 rounded p-4 border border-blue-200">
                    <p class="text-sm text-blue-600">Saldo</p>
                    <p class="text-xl font-bold text-blue-700">R$ 0,00</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
